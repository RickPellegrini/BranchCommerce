<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branch Hunter</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="brand">
          <img
            class="brand-logo"
            src="https://branch-commerce.vercel.app/branch_logo.jpeg"
            alt="Branch Commerce logo"
          />
          <div>
            <h1>Branch Hunter</h1>
            <p>Configuracoes da calculadora embutida no anuncio</p>
          </div>
        </div>
      </header>

      <section class="card form-grid">
        <label>
          Injecao automatica na pagina
          <select id="auto-inject-enabled">
            <option value="true">Ativada</option>
            <option value="false">Desativada</option>
          </select>
        </label>
        <label>
          Taxa ML fallback (%)
          <input
            id="manual-sale-fee-percent-fallback"
            type="number"
            step="0.01"
            min="0"
            value="16"
          />
        </label>
      </section>

      <section class="card form-grid">
        <h2>Sincronizacao de custo com BranchHub</h2>
        <label>
          Enviar custo da calculadora para plataforma
          <select id="sync-enabled">
            <option value="false">Desativado</option>
            <option value="true">Ativado</option>
          </select>
        </label>
        <label>
          URL da plataforma
          <input
            id="sync-api-base-url"
            type="text"
            placeholder="https://branch-commerce.vercel.app"
          />
        </label>
        <label>
          Chave de sincronizacao
          <input id="sync-api-key" type="password" placeholder="BRANCH_HUNTER_SYNC_KEY" />
        </label>
      </section>

      <section class="card form-grid">
        <h2>Custos padrao da operacao</h2>
        <label>
          Custo produto (R$)
          <input id="default-product-cost" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Impostos (%)
          <input id="default-tax-percent" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Frete gratis ML (padrao)
          <select id="default-free-shipping-enabled">
            <option value="true">Ativado</option>
            <option value="false">Desativado</option>
          </select>
        </label>
        <label>
          Minimo frete gratis (R$)
          <input
            id="default-free-shipping-min-price"
            type="number"
            step="0.01"
            min="0"
            value="79"
          />
        </label>
        <label>
          Subsidio ML (%)
          <input
            id="default-free-shipping-subsidy-percent"
            type="number"
            step="0.01"
            min="0"
            max="100"
            value="50"
          />
        </label>
        <label>
          Frete padrao (R$)
          <input id="default-shipping-cost" type="number" step="0.01" min="0" value="12" />
        </label>
        <label>
          Frete manual (R$)
          <input id="default-manual-shipping" type="number" step="0.01" min="0" value="12" />
        </label>
        <label>
          Frete manual ativo (padrao)
          <select id="default-force-manual-shipping">
            <option value="false">Nao</option>
            <option value="true">Sim</option>
          </select>
        </label>
      </section>

      <section class="actions">
        <button id="save-settings" class="btn btn-primary" type="button">Salvar</button>
        <button id="reset-settings" class="btn btn-secondary" type="button">Padrao</button>
      </section>

      <section class="card">
        <p id="status-message" class="status">Ajuste os valores e clique em salvar.</p>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
