<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branch Hunter</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <h1>Branch Hunter</h1>
        <p>Calculadora de payout para Mercado Livre</p>
      </header>

      <section class="card">
        <h2>Dados do anuncio</h2>
        <div class="meta">
          <span id="listing-title">Nenhum anuncio detectado</span>
          <span id="listing-url"></span>
        </div>
        <button id="use-page-data" class="btn btn-secondary" type="button">
          Usar preco da pagina
        </button>
      </section>

      <section class="card form-grid">
        <label>
          Preco de venda (R$)
          <input id="sale-price" type="number" step="0.01" min="0" />
        </label>
        <label>
          Custo do produto (R$)
          <input id="product-cost" type="number" step="0.01" min="0" />
        </label>
        <label>
          Frete (R$)
          <input id="shipping-cost" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Taxa ML (%)
          <input id="ml-fee-percent" type="number" step="0.01" min="0" value="16" />
        </label>
        <label>
          Impostos (%)
          <input id="tax-percent" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Outros custos fixos (R$)
          <input id="fixed-cost" type="number" step="0.01" min="0" value="0" />
        </label>
      </section>

      <section class="actions">
        <button id="calculate" class="btn btn-primary" type="button">Calcular</button>
        <button id="reset" class="btn btn-secondary" type="button">Limpar</button>
      </section>

      <section class="card result">
        <h2>Resultado</h2>
        <div class="result-row">
          <span>Valor taxa ML</span>
          <strong id="result-fee">R$ 0,00</strong>
        </div>
        <div class="result-row">
          <span>Valor impostos</span>
          <strong id="result-tax">R$ 0,00</strong>
        </div>
        <div class="result-row">
          <span>Payout (antes do custo produto)</span>
          <strong id="result-payout">R$ 0,00</strong>
        </div>
        <div class="result-row">
          <span>Lucro liquido</span>
          <strong id="result-profit">R$ 0,00</strong>
        </div>
        <div class="result-row">
          <span>Margem liquida</span>
          <strong id="result-margin">0,00%</strong>
        </div>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
