<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Branch Hunter</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="brand">
          <img class="brand-logo" src="https://branch-commerce.vercel.app/branch_logo.jpeg" alt="Branch Commerce logo" />
          <div>
            <h1>Branch Hunter</h1>
            <p>Configuracoes da calculadora embutida no anuncio</p>
          </div>
        </div>
      </header>

      <section class="card form-grid">
        <label>
          Injecao automatica na pagina
          <select id="auto-inject-enabled">
            <option value="true">Ativada</option>
            <option value="false">Desativada</option>
          </select>
        </label>
        <label>
          Taxa ML fallback (%)
          <input id="manual-sale-fee-percent-fallback" type="number" step="0.01" min="0" value="16" />
        </label>
      </section>

      <section class="card form-grid">
        <h2>Custos padrao da operacao</h2>
        <label>
          Custo produto (R$)
          <input id="default-product-cost" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Impostos (%)
          <input id="default-tax-percent" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Ads (%)
          <input id="default-ads-percent" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Embalagem (R$)
          <input id="default-packaging-cost" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Outros custos fixos (R$)
          <input id="default-other-fixed-costs" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Margem de risco (%)
          <input id="default-risk-percent" type="number" step="0.01" min="0" value="0" />
        </label>
        <label>
          Frete fallback (R$)
          <input id="default-shipping-fallback" type="number" step="0.01" min="0" value="0" />
        </label>
      </section>

      <section class="actions">
        <button id="save-settings" class="btn btn-primary" type="button">Salvar</button>
        <button id="reset-settings" class="btn btn-secondary" type="button">Padrao</button>
      </section>

      <section class="card">
        <p id="status-message" class="status">Ajuste os valores e clique em salvar.</p>
      </section>
    </main>

    <script src="./popup.js"></script>
  </body>
</html>
