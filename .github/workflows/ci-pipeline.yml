name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────
  # 1. LINT — Verifica qualidade do código
  # ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier (verificar formatação)
        run: npm run format:check

      - name: TypeScript (type check)
        run: npm run typecheck

  # ─────────────────────────────────────────────
  # 2. TEST — Roda os testes automatizados (Vitest)
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Testes
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm run test

      - name: Upload cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ─────────────────────────────────────────────
  # 3. BUILD — Compila o projeto Next.js
  # ─────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/

  # ─────────────────────────────────────────────
  # 4. SECURITY — Auditoria de dependências
  # ─────────────────────────────────────────────
  security:
    name: 🛡️ Segurança
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Audit de dependências
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─────────────────────────────────────────────
  # 5. DEPLOY — Deploy para produção (só na main)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      # ── OPÇÃO A: Deploy na Vercel ──
      - name: Deploy Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      # ── OPÇÃO B: Deploy via Docker (descomente se usar) ──
      # - name: Build Docker image
      #   run: docker build -t branchhub:${{ github.sha }} .
      #
      # - name: Push para registry
      #   run: |
      #     echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
      #     docker tag branchhub:${{ github.sha }} ${{ secrets.DOCKER_REGISTRY }}/branchhub:latest
      #     docker push ${{ secrets.DOCKER_REGISTRY }}/branchhub:latest
